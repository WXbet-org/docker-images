# ---------------------------------------------------------------------
# dreamos-buildsystem-ubnt18 (release pipeline + test build)
#
# Two modes, selected by trigger:
#
#   TAG PUSH (dreamos-buildsystem-ubnt18/vX.Y.Z) — full release:
#     Phase 1: Build the base image (Ubuntu 18.04 + Pro/ESM + toolchain)
#              and push to ghcr.io/wxbet-org/dreamos-buildsystem-base:vX.Y.Z (+ :latest)
#     Phase 2: Compose the ubnt18 image on ghcr from the just-built base +
#              the existing sources image. Uses regctl and OCI cross-repo
#              blob mount -- no layer blobs downloaded. Pushes to
#              ghcr.io/wxbet-org/dreamos-buildsystem-ubnt18:vX.Y.Z (+ :latest)
#
#   MANUAL (workflow_dispatch) — base-only sanity check:
#     Phase 1 runs but `push: false` — the base image is built to
#     verify Dockerfile / apt / pip / ESM-attach still work, but no
#     bytes land on GHCR. Phase 2 is skipped entirely. Use this to
#     iterate on Dockerfile changes without cutting a release or
#     overwriting :latest.
#
# `:latest` on both images (release mode only) is updated only when
# this tag is the highest sortable dreamos-buildsystem-ubnt18/* tag
# (guards against late hotfixes on older branches overwriting :latest).
# ---------------------------------------------------------------------

name: dreamos-buildsystem-ubnt18

on:
  push:
    tags:
      - 'dreamos-buildsystem-ubnt18/*'
  workflow_dispatch:

env:
  BASE_IMAGE:    ghcr.io/wxbet-org/dreamos-buildsystem-base
  SOURCES_IMAGE: ghcr.io/wxbet-org/dreamos-buildsystem-sources
  UBNT18_IMAGE:  ghcr.io/wxbet-org/dreamos-buildsystem-ubnt18
  BASE_DIR:      dreamos-buildsystem-base
  UBNT18_DIR:    dreamos-buildsystem-ubnt18
  TAG_PREFIX:    dreamos-buildsystem-ubnt18/

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (full history for tag sort)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version, release mode and :latest eligibility
        id: tags
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              # Release mode — publish base + compose ubnt18
              echo "is_release=1" >> "$GITHUB_OUTPUT"
              VERSION="${GITHUB_REF_NAME#${TAG_PREFIX}}"
              HIGHEST_FULL=$(git tag -l "${TAG_PREFIX}*" | sort -V | tail -1)
              HIGHEST_VERSION="${HIGHEST_FULL#${TAG_PREFIX}}"
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
              if [ "${VERSION}" = "${HIGHEST_VERSION}" ]; then
                  echo "is_highest=1" >> "$GITHUB_OUTPUT"
                  echo "Version ${VERSION} is the highest; :latest will be updated on both images."
              else
                  echo "is_highest=0" >> "$GITHUB_OUTPUT"
                  echo "Version ${VERSION} is not the highest (highest: ${HIGHEST_VERSION}); :latest untouched."
              fi
          else
              # Test mode — build only, no push, no compose
              echo "is_release=0" >> "$GITHUB_OUTPUT"
              echo "version=test" >> "$GITHUB_OUTPUT"
              echo "is_highest=0" >> "$GITHUB_OUTPUT"
              echo "workflow_dispatch: base-only sanity check — no bytes on GHCR."
          fi

      # ================== PHASE 1: build + push base image ==================

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write pro-attach-config.yaml from secret
        run: |
          if [ -z "${{ secrets.UBUNTU_PRO_TOKEN }}" ]; then
            echo "::error::Secret UBUNTU_PRO_TOKEN is not set."
            exit 1
          fi
          cat > "${BASE_DIR}/pro-attach-config.yaml" <<EOF
          token: ${{ secrets.UBUNTU_PRO_TOKEN }}
          enable_services:
            - esm-infra
            - esm-apps
          EOF
          chmod 0600 "${BASE_DIR}/pro-attach-config.yaml"

      - name: Compute base tag list
        id: base_tags
        run: |
          V="${{ steps.tags.outputs.version }}"
          if [ "${{ steps.tags.outputs.is_release }}" != "1" ]; then
              # Test build — tag locally with a throwaway name.
              # docker/build-push-action requires `tags` even when push=false.
              TAG_LIST="${BASE_IMAGE}:test-build"
          elif [ "${{ steps.tags.outputs.is_highest }}" = "1" ]; then
              TAG_LIST="${BASE_IMAGE}:${V},${BASE_IMAGE}:latest"
          else
              TAG_LIST="${BASE_IMAGE}:${V}"
          fi
          echo "tag_list=${TAG_LIST}" >> "$GITHUB_OUTPUT"

      - name: Build (and, on tag push, push) base image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ env.BASE_DIR }}
          push: ${{ steps.tags.outputs.is_release == '1' }}
          tags: ${{ steps.base_tags.outputs.tag_list }}
          build-args: |
            IMAGE_COMMIT=${{ github.sha }}
            IMAGE_VERSION=${{ steps.tags.outputs.version }}
          secret-files: |
            pro-attach-config=./${{ env.BASE_DIR }}/pro-attach-config.yaml
          # no-cache: every release should re-run apt-get upgrade so
          # ESM patches actually land in the new image.
          no-cache: true

      - name: Wipe local pro-attach-config.yaml
        if: always()
        run: rm -f "${BASE_DIR}/pro-attach-config.yaml"

      # ================== PHASE 2: compose + push ubnt18 image ==================
      # Skipped entirely on workflow_dispatch — nothing to compose from
      # a base that wasn't pushed.

      - name: Install regctl
        if: steps.tags.outputs.is_release == '1'
        uses: regclient/actions/regctl-installer@main

      - name: regctl login to ghcr
        if: steps.tags.outputs.is_release == '1'
        run: |
          regctl registry login ghcr.io \
              -u "$GITHUB_ACTOR" \
              -p "${{ secrets.GITHUB_TOKEN }}"

      - name: Compose ubnt18:${{ steps.tags.outputs.version }}
        if: steps.tags.outputs.is_release == '1'
        env:
          BASE:    ${{ env.BASE_IMAGE }}:${{ steps.tags.outputs.version }}
          SOURCES: ${{ env.SOURCES_IMAGE }}:latest
          DST:     ${{ env.UBNT18_IMAGE }}:${{ steps.tags.outputs.version }}
        run: |
          chmod +x "${UBNT18_DIR}/compose.sh"
          "${UBNT18_DIR}/compose.sh"

      - name: Also push ubnt18:latest (if this version is the highest)
        if: steps.tags.outputs.is_release == '1' && steps.tags.outputs.is_highest == '1'
        env:
          BASE:    ${{ env.BASE_IMAGE }}:${{ steps.tags.outputs.version }}
          SOURCES: ${{ env.SOURCES_IMAGE }}:latest
          DST:     ${{ env.UBNT18_IMAGE }}:latest
        run: |
          "${UBNT18_DIR}/compose.sh"
