# ---------------------------------------------------------------------
# dreamos-buildsystem-ubnt18 (composed)
#
# Composes the consumable ubnt18 image on the registry from:
#   * dreamos-buildsystem-base:latest      (toolchain, built by base workflow)
#   * dreamos-buildsystem-sources:latest   (data snapshot, built manually)
#
# Uses regctl and OCI cross-repo blob mount -- no layer blobs are
# downloaded to the runner. Runtime: ~30 seconds. See the compose.sh
# script in this image folder for the actual mechanics.
#
# Tag scheme: dreamos-buildsystem-ubnt18/<version>
# ---------------------------------------------------------------------

name: dreamos-buildsystem-ubnt18

on:
  push:
    tags:
      - 'dreamos-buildsystem-ubnt18/*'
  workflow_dispatch:

env:
  BASE:    ghcr.io/wxbet-org/dreamos-buildsystem-base:latest
  SOURCES: ghcr.io/wxbet-org/dreamos-buildsystem-sources:latest
  IMAGE:   ghcr.io/wxbet-org/dreamos-buildsystem-ubnt18
  IMAGE_DIR: dreamos-buildsystem-ubnt18
  TAG_PREFIX: dreamos-buildsystem-ubnt18/

jobs:
  compose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (full history for tag sort)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install regctl
        uses: regclient/actions/regctl-installer@main

      - name: Log in to ghcr.io
        run: |
          regctl registry login ghcr.io \
              -u "$GITHUB_ACTOR" \
              -p "${{ secrets.GITHUB_TOKEN }}"

      - name: Determine version and :latest eligibility
        id: tags
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              VERSION="${GITHUB_REF_NAME#${TAG_PREFIX}}"
              HIGHEST_FULL=$(git tag -l "${TAG_PREFIX}*" | sort -V | tail -1)
              HIGHEST_VERSION="${HIGHEST_FULL#${TAG_PREFIX}}"
          else
              # workflow_dispatch: no tag context, just move :latest
              VERSION="latest"
              HIGHEST_VERSION="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [ "${VERSION}" = "${HIGHEST_VERSION}" ]; then
              echo "is_highest=1" >> "$GITHUB_OUTPUT"
          else
              echo "is_highest=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose ubnt18:${{ steps.tags.outputs.version }}
        env:
          DST: ${{ env.IMAGE }}:${{ steps.tags.outputs.version }}
        run: |
          chmod +x "${IMAGE_DIR}/compose.sh"
          "${IMAGE_DIR}/compose.sh"

      - name: Also push :latest (if this version is the highest)
        if: steps.tags.outputs.is_highest == '1' && steps.tags.outputs.version != 'latest'
        env:
          DST: ${{ env.IMAGE }}:latest
        run: |
          "${IMAGE_DIR}/compose.sh"
