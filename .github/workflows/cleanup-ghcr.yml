# ---------------------------------------------------------------------
# cleanup-ghcr
#
# Prunes truly orphaned untagged container versions from the two GHCR
# packages this repo publishes. Runs weekly on Sunday night and can be
# triggered manually.
#
# Uses snok/container-retention-policy which is manifest-list aware:
# it walks each tagged manifest's children and refuses to delete
# anything still referenced -- unlike naive "delete all untagged"
# tools which either silently no-op or corrupt tagged images.
#
# Requires GITHUB_TOKEN with `packages: write` (repo-level). The
# packages themselves need each repo in their "Manage Actions access"
# with the Write role (Settings on each package page).
# ---------------------------------------------------------------------

name: cleanup-ghcr

on:
  workflow_dispatch:      # manual trigger from the Actions tab
  schedule:
    - cron: '0 3 * * 0'   # every Sunday 03:00 UTC

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete orphaned untagged versions
        uses: snok/container-retention-policy@v3.1.0
        with:
          account: wxbet-org
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: 'dreamos-buildsystem-base dreamos-buildsystem-ubnt18 dreamos-buildsystem-sources'
          # tag-selection=untagged: only consider untagged versions.
          # image-tags='!*': never touch anything with any tag.
          # keep-n-most-recent=5: layered safety -- keep the 5 newest
          #   untagged in each package no matter what. Buildx pushes
          #   tagged images as OCI index manifests that reference
          #   platform + attestation child manifests as untagged; those
          #   children must survive or the tagged image breaks.
          # cut-off=1h: extra guard against racing with a fresh release.
          #   If a release just pushed and cleanup runs seconds later,
          #   the just-published untagged children are all <1h old and
          #   stay protected. Cron runs Sunday 03:00 UTC so this only
          #   matters for manual dispatches close to a tag push.
          image-tags: '!*'
          tag-selection: untagged
          keep-n-most-recent: 5
          cut-off: 1h
          dry-run: false
