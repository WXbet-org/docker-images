# SimpleBuild4 — one-liner deployment.
#
# Usage:
#   mkdir -p ~/s4-data
#   docker compose up -d          # web + mcp in the background
#   docker compose logs -f        # follow logs
#   docker compose down           # stop + remove
#
# Data is bind-mounted from ~/s4-data (created if missing). The
# container's entrypoint auto-detects the mount owner and drops from
# root to your uid — files stay owned by you on the host.
#
# Interactive TUI:
#   docker compose run --rm s4 s4
#
# Override the image tag:
#   S4_TAG=2026.04.488 docker compose up -d

services:
  s4:
    image: ghcr.io/wxbet-org/simplebuild4:${S4_TAG:-latest}
    container_name: s4
    ports:
      - "8080:8080"    # Web-TUI (textual-serve)
      - "8181:8181"    # MCP (streamable HTTP)
      - "6274:6274"    # MCP Inspector — client UI (only while running)
      - "6277:6277"    # MCP Inspector — proxy server
    volumes:
      - "${HOME}/s4-data:/app/data"
    # Propagate host terminal capabilities so Textual gets 256/truecolor
    # instead of docker's default TERM=xterm (16-color fallback → wrong
    # theme rendering).
    environment:
      - TERM
      - COLORTERM
    restart: unless-stopped
